# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  # Запускать при каждом пуше в main
  push:
    branches: [ main ]
  # И возможность запустить руками из вкладки Actions
  workflow_dispatch:

# Разрешения, чтобы деплой на Pages вообще был возможен
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v5

      - name: Install, build, and upload your site
        uses: withastro/action@v5
        # Astro сам увидит package-lock и сделает npm ci + npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
